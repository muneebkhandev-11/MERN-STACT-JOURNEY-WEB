<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <!-- <iframe src="" frameborder="0"></iframe> -->

          <!-- controls -->
            <!-- width= -->
            <!-- loop -->
            <!-- autoplay -->
            <!-- muted -->
            <!-- poster -->


         <h1>YouTube video</h1>
         <!-- youtube video ko hum iframe tag ke zariye apne webpage me embed kar sakte hai. iframe tag ke andar hum youtube video ka url denge jise hum embed karna chahte hai. youtube video ka url hume youtube ke share option me milta hai. waha se hume embed code milega jise hum apne webpage me paste kar sakte hai. iframe tag ke andar hum width aur height attribute ka use karke video ka size bhi set kar sakte hai. -->
         
         <iframe  width="560" height="315" src="https://www.youtube.com/embed/DOuecVexDsQ?si=aTgLf8imgQFnUgG2" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>





        <!-- agar hum video ko atuoplay karna chahte hai to video ka ko muted karna zaruri hai warna video autouplay nahi karenga.ik sath dono ko -->
         <h1>Galley video</h1>
         <video src="moneeb.mp4" 
         controls
         width="300"
         loop
         autoplay
         muted
         ></video>






         <h1>Audio </h1>

         <audio src="/audio.mp3"
         muted
         loop
         autoplay
         controls
         width="150"
         height="50">
        </audio>







        <h1>poster kilia  yanee thumbnail</h1>
        <!-- poster attribute se hum video ke liye ek image set kar sakte hai jo video ke load hone se pehle dikhai degi. jab tak video load nahi hota tab tak poster image dikhai degi. -->
        
           

        <!-- loop use hota he video ko bar bar chalane ke liye jab video khatam ho jata hai to wo phir se start ho jata hai. autoplay use hota hai video ko automatically chalane ke liye jab page load hota hai to video apne aap chalne lagta hai. muted use hota hai video ke sound ko band karne ke liye jab hum autoplay ka use karte hai to video ko muted karna zaruri hota hai warna video autoplay nahi karega. controls use hota hai video ke control buttons dikhane ke liye jise user play, pause, volume control, full screen etc. kar sakta hai. width aur height attribute se hum video ka size set kar sakte hai. poster attribute se hum video ke liye ek image set kar sakte hai jo video ke load hone se pehle dikhai degi. -->


            <video src="moneeb.mp4" 
            controls
            width="300"
            loop
            autoplay
            muted
            poster="photo.jpg"
            ></video>
         
         
    </div>
</body>
</html>
