<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* LINKS: HAVE THREE STATE  */
      /* NO 1: simple link ,
        NO 2:visited (yanee jab hum visit kare or dobara aya os iska kesa color hona cha ye )
        NO 3:active (matlab jab hum hover kare tab kia property show hote he ) */
      .google:link {
        color: red;
        text-decoration-style: none;
        border: 1px;
      }
      .goolge:visited {
        color: green;
      }
      .goolge:active {
        color: yellow;
        text-decoration-style: wavy;
      }
      .google:hover {
        color: blue;
        box-shadow: 1px 1px 5px;
        border-radius: 20px;
        padding: 10px;
      }
      .linkedin:hover {
        color: blue;
        box-shadow: 1px 1px 5px;
        border-radius: 20px;
        padding: 10px;
      }
      .Facebook:hover {
        color: blue;
        box-shadow: 1px 1px 5px;
        border-radius: 20px;
        padding: 10px;  
      }
    </style>
  </head>
  <body>
    <a class="google" href="https://www.google.com/" target="_blank">google</a>
    <a class="Facebook" href="https://www.google.com/" target="_blank"
      >Facebook</a
    >
    <a class="linkedin" href="https://www.google.com/" target="_blank"
      >linkedin</a
    >
  </body>
</html>
