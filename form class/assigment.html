<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
  </head>
  <body>
    <div>
      <h1 style="background-color: rgb(205, 225, 243); color: chocolate">
        WELLCOME TO MY WEBSITE!
      </h1>
      <form action="">
        <fieldset style="border: solid black; width: 600px">
          <legend>Personal Information</legend>
          <label for="Name">Full Name:</label><br />
          <input
            type="text"
            placeholder="input your full name"
            required
            id="Name"
          /><br />
          <br />
          <label for="email">Email Address:</label><br />
          <input
            type="email"
            placeholder="input your email"
            required
            id="email"
          /><br />
          <br />
          <label for="khan">Phone number:</label><br />
          <input
            type="tel"
            name=""
            id="khan"
            placeholder="phone number"
            required
          /><br />
          <br />
          <label for="Date">Date of birth</label> <br />
          <input type="date" name="" id="date" /><br />
          <br />
        </fieldset>

        <fieldset style="border: double; width: 600px">
          <legend>Job Details</legend>
          <label for=""></label>Job Position:
          <select name="afridi" id="">
            <option value="afridi">Fronted Developer</option>
            <option value="afridi">Backent Developer</option>
            <option value="afridi">UI/UX Designer</option>
            <option value="afridi">QA Engineer</option>
          </select>
          <br /><br />
          <label for="hi">Preferred Work Location</label><br />
          <input type="radio" name="hi" id="" />On_site <br />
          <input type="radio" name="hi" id="" />Remote <br />
          <input type="radio" name="hi" id="" />Hybride <br />
          <br />
          <label for="hello">Skills:</label><br />
          <input type="checkbox" name="" id="hello" />HTML
          <input type="checkbox" name="" id="hello" />CSS
          <input type="checkbox" name="" id="hello" />Javascript
          <input type="checkbox" name="" id="hello" />Nods.js
          <input type="checkbox" name="" id="hello" />React <br />
          <br />

          <label for="foll">Resume Upload:</label><br />
          <input type="file" name="" id="foll" />
          <br />
          <br />
          <label for="text">Feedback:</label><br />
          <textarea
            name=""
            id="text"
            required
            placeholder="Leave a message for us!"
          ></textarea>
        </fieldset>

        <fieldset style="border: solid brown; width: 300px">
          <legend>Extra Section</legend>
          <label for="search">Search your favorite tech stack:</label><br />
          <input type="search" name="" id="search" /><br />

          <label for="">Password:</label><br />
          <input type="password" name="" id="" /><br />

          <label for="">Confirm password:</label><br />
          <input type="password" name="" id="" /><br />
          <br />
          <input type="submit" name="" id="" />
          <input type="button" value="reset" name="" id="" />
        </fieldset>
      </form>
    </div>
  </body>
</html>
