<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      input[type="text"],
      input[type="Email"],
      input[type="password"] {
        border: 2px solid;
        background-color: aquamarine;
       
      }
     
    
      .login{
        margin-bottom: 10px;
        border: 1px solid;
        margin: auto;
        padding: 10px;
        align-items: center;
      }
     
    </style>
  </head>
  <body>
    <div class="login">
      <h1>FORM</h1>
      <form action="" class="form">
        <div class="group">
          <label for="">Name:</label>
          <input type="text" placeholder="enter your name...." />
        </div>
        <div class="group">
          <label for="">Email:</label>
          <input type="email" placeholder="enter your Email..." />
        </div>
        <div class="group">
          <label for="">Password:</label>
          <input type="password" />
        </div>
        <div class="group">
          <textarea name="" id="" placeholder="Details">Feedback:</textarea>
        </div>
      </form>
    </div>
  </body>
</html>
