<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSITION in CSS</title>
    <style>
      .section {
        border: 1px solid;
        width: 300px;
        height: 300px;
        background-color: blueviolet;
      }
      .section_1 {
        border: 1px solid;
        width: 300px;
        height: 300px;
        background-color: rgb(6, 211, 157);
        /* absolute : body se top , right , left ,bottom se lita he  */
        position: absolute;
        top: 40px;
        left: 50px;
      }
      /* Fixed  */
      .section_2 {
        border: 1px solid;
        width: 300px;
        height: 300px;
        background-color: rgb(15, 6, 24);

        /* position: fixed;
        top: 50px;
        right: 30px; */
      }
      .section_3 {
        border: 1px solid;
        width: 300px;
        height: 300px;
        background-color: rgb(16, 24, 232);
      }
      .parent {
        border: 1px solid;
        width: 500px;
        height: 500px;
        background-color: aqua;
        /* (absolute property apply karne per apne jaga chorta he ) */
        position: absolute;
        top: 10px;
        left: 30px;
      }
      .section_4 {
        border: 1px solid;
        width: 50px;
        height: 50px;
        position: fixed;
        bottom: 40px;
        right: 40px;
        background-color: green;
      }
      ul > li {
        display: inline-block;
        list-style: none;
        border: 1px solid;
        border-radius: 6px;
        padding: 10px;
      }
      ul {
        border: 1px solid;
        background-color: rgb(255, 230, 3);
        padding: 10px 0px;

        position: sticky;
        top:60px;
        /* top: 0px; */
        /* z_index jiska ziada hoga wo sabse oper aye or defeult "0" hota he  */
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="section_1 section"></div>
    <!-- <div class="nav"> -->
      <ul>
        <li>list_1</li>
        <li>list_2</li>
        <li>list_3</li>
        <li>list_4</li>
        <li>list_4</li>
      </ul>
    <!-- </div> -->
     SECTION 5
    <div class="section_5 section"></div>
    PARENT 
    <div class="parent"></div>
    SECTION 2
    <div class="section_2 section"></div>
    SECTION 3
    <div class="section_3 section"></div>
    SECTION 4
    <div class="section_4 section"></div>
    SECTION 5
    <div class="section_5 section"></div>
    <div class="section_5 section"></div>
  </body>
</html>
