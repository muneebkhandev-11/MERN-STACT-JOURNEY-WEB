<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* color  */
      /* foreground color we use background-color property and for text color we use color property */

      p {
        /* hex code  */
        /* color : #00ff33; */

        /* rgb code */
        /* color value range:0 to 255 */
        /* color :rgb(23, 33, 99); */

        /* color pickers  */
      }
      .section {
        /* background-color: rgb(0, 255, 0); */
        /* for opecity we use rgba code (alph) */
        /* background-color: rgb(0, 255, 0, 0.3); */
        background-color: rgba(22, 22, 222);
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sint

        possimus velit?
      </p>
    </div>
  </body>
</html>
